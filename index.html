<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta Lens Pro</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --success-color: #059669;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 20px; background-color: var(--bg-color); color: var(--text-main);
        }

        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        h2 { text-align: center; margin-bottom: 25px; letter-spacing: -0.5px; }

        #upload-section { 
            position: relative; border: 2px dashed #cbd5e0; padding: 40px 20px; 
            text-align: center; border-radius: 16px; background-color: #ffffff;
            transition: all 0.2s ease-in-out; cursor: pointer;
        }

        #upload-section.dragover { border-color: var(--primary-color); background-color: #eff6ff; transform: scale(1.01); }
        #upload-section.minimized { padding: 15px; margin-bottom: 15px; }

        .upload-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
        .upload-text { font-weight: 600; color: #334155; }
        .upload-subtext { font-size: 0.85rem; color: #94a3b8; margin-top: 5px; }

        #preview { 
            display: none; width: 100%; max-height: 400px; 
            object-fit: contain; margin: 20px 0; border-radius: 12px; background: #eee;
        }

        #map-link { 
            display: none; text-align: center; margin: 15px 0; padding: 14px; 
            background-color: var(--success-color); color: white; text-decoration: none; 
            border-radius: 12px; font-weight: bold; font-size: 0.95rem;
            transition: opacity 0.2s;
        }
        #map-link:hover { opacity: 0.9; }

        .table-wrapper { width: 100%; margin-top: 20px; border-top: 2px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; display: none; font-size: 0.9rem; }
        th, td { padding: 14px 10px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { color: #64748b; width: 35%; font-weight: 500; background-color: #fbfcfe; }
        td { font-weight: 500; word-break: break-all; }
        
        /* 주요 정보 강조 */
        .highlight { color: var(--primary-color); font-weight: 700; }
    </style>
</head>
<body>
    
<div class="container">
    <header>
        <!-- 아이콘 삭제됨 -->
        <h1>Meta Lens</h1>
        <p class="subtitle">Metacata Viewer</p>
    </header>

    <div class="privacy-note">
        🔒 모든 작업은 브라우저 내에서 처리되어 안전합니다.
    </div>
    
    <div id="upload-section">
        <span class="upload-icon">📸</span>
        <div class="upload-text">사진을 선택하거나 드래그하세요</div>
        <div class="upload-subtext">정보 확인을 위해 원본 파일을 권장합니다</div>
        <input type="file" id="file-input" accept="image/jpeg, image/png" style="display:none">
    </div>

    <img id="preview">
    <a id="map-link" target="_blank">📍 Google 지도로 촬영지 열기</a>

    <div class="table-wrapper">
        <table id="metadata-table">
            <tbody id="metadata-body"></tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<script>
    const section = document.getElementById('upload-section');
    const input = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    const mapLink = document.getElementById('map-link');
    const tbody = document.getElementById('metadata-body');
    const table = document.getElementById('metadata-table');

    section.onclick = () => input.click();
    input.onchange = (e) => handleFiles(e.target.files);

    section.ondragover = (e) => { e.preventDefault(); section.classList.add('dragover'); };
    section.ondragleave = () => section.classList.remove('dragover');
    section.ondrop = (e) => {
        e.preventDefault();
        section.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    };

    function handleFiles(files) {
        const file = files[0];
        if (!file) return;

        // UI 초기화
        tbody.innerHTML = '';
        table.style.display = 'none';
        mapLink.style.display = 'none';
        section.classList.add('minimized');

        // 미리보기
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);

        // EXIF 데이터 처리
        EXIF.getData(file, function() {
            const tags = EXIF.getAllTags(this);
            
            if (Object.keys(tags).length > 0) {
                table.style.display = 'table';
                
                // 중요 정보 우선 정의
                const importantData = {
                    "제조사": tags.Make,
                    "모델": tags.Model,
                    "촬영일시": tags.DateTimeOriginal || tags.DateTime,
                    "해상도": `${tags.PixelXDimension || tags.ExifImageWidth} x ${tags.PixelYDimension || tags.ExifImageHeight}`,
                    "노출시간": tags.ExposureTime ? `1/${Math.round(1/tags.ExposureTime)}초` : null,
                    "조리개": tags.FNumber ? `f/${tags.FNumber}` : null,
                    "ISO": tags.ISOSpeedRatings,
                    "초점거리": tags.FocalLength ? `${tags.FocalLength}mm` : null
                };

                // 주요 정보 출력
                for (let key in importantData) {
                    if (importantData[key]) {
                        addRow(key, importantData[key], true);
                    }
                }

                // GPS 처리
                const lat = EXIF.getTag(this, "GPSLatitude");
                const lon = EXIF.getTag(this, "GPSLongitude");
                if (lat && lon) {
                    const decLat = convertToDecimal(lat, EXIF.getTag(this, "GPSLatitudeRef"));
                    const decLon = convertToDecimal(lon, EXIF.getTag(this, "GPSLongitudeRef"));
                    mapLink.href = `https://www.google.com/maps?q=${decLat},${decLon}`;
                    mapLink.style.display = 'block';
                    addRow("위도", decLat.toFixed(6));
                    addRow("경도", decLon.toFixed(6));
                }

                // 나머지 기타 정보 출력 (선택 사항 - 너무 많으면 생략 가능)
                // for (let tag in tags) { ... }
            } else {
                alert("메타데이터를 찾을 수 없습니다. (카카오톡 등으로 전송된 사진은 정보가 삭제될 수 있습니다)");
            }
        });
    }

    function addRow(label, value, isHighlight = false) {
        const row = `<tr><th>${label}</th><td class="${isHighlight ? 'highlight' : ''}">${value}</td></tr>`;
        tbody.innerHTML += row;
    }

    function convertToDecimal(pos, ref) {
        let val = pos[0].numerator / pos[0].denominator + 
                  (pos[1].numerator / pos[1].denominator) / 60 + 
                  (pos[2].numerator / pos[2].denominator) / 3600;
        return (ref === "S" || ref === "W") ? val * -1 : val;
    }
</script>
</body>
</html>
