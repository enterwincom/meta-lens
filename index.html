<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta Lens Pro</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #059669;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --error-color: #ef4444;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 20px; background-color: var(--bg-color); color: var(--text-main);
            line-height: 1.5;
        }

        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        header { text-align: center; margin-bottom: 20px; }
        h1 { margin: 0; color: var(--primary-color); font-size: 1.5rem; letter-spacing: -0.5px; }
        .subtitle { color: #64748b; font-size: 0.9rem; margin-top: 4px; }

        .privacy-note { 
            text-align: center; font-size: 0.75rem; color: #64748b; 
            background: #f1f5f9; padding: 10px; border-radius: 12px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        #upload-section { 
            position: relative; border: 2px dashed #cbd5e0; padding: 40px 20px; 
            text-align: center; border-radius: 16px; background-color: #ffffff;
            transition: all 0.2s ease-in-out; cursor: pointer;
        }

        #upload-section.dragover { border-color: var(--primary-color); background-color: #eff6ff; transform: scale(1.01); }
        #upload-section.minimized { padding: 15px; margin-bottom: 15px; border-style: solid; border-width: 1px; }

        .upload-icon { font-size: 2rem; margin-bottom: 10px; display: block; }
        .upload-text { font-weight: 600; color: #334155; }
        
        #preview-container { display: none; margin-top: 15px; text-align: center; }
        #preview { 
            width: 100%; max-height: 400px; 
            object-fit: contain; border-radius: 12px; 
            background: #f1f5f9; border: 1px solid #e2e8f0;
        }

        /* 구글 지도 버튼 스타일 수정 */
        #map-btn { 
            display: none; 
            width: fit-content;      /* 텍스트 길이에 맞춰 조절 */
            min-width: 220px;        /* 너무 짧아지지 않게 최소 너비 설정 */
            margin: 15px auto 0 auto; /* 상단 여백 15px, 좌우 auto로 중앙 정렬 */
            padding: 12px 24px;      /* 좌우 여백을 넓혀 여유 부여 */
            background-color: var(--success-color); 
            color: white; 
            text-decoration: none; 
            border-radius: 50px;     /* 더 세련된 캡슐형 디자인 */
            font-weight: bold; 
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.2);
            transition: transform 0.2s, background-color 0.2s;
            text-align: center;
        }
        #map-btn:active { transform: scale(0.98); }

        .table-wrapper { width: 100%; margin-top: 25px; border-top: 2px solid #f1f5f9; padding-top: 10px; }
        table { width: 100%; border-collapse: collapse; display: none; font-size: 0.9rem; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #f8fafc; }
        th { color: #64748b; width: 35%; font-weight: 500; }
        td { font-weight: 600; word-break: break-all; color: #334155; }
        .highlight { color: var(--primary-color) !important; }

        .loading-spinner { 
            display: none; text-align: center; margin: 20px auto; 
            color: var(--primary-color); font-weight: bold; 
        }

        .error-msg { color: var(--error-color); font-size: 0.85rem; margin-top: 10px; display: none; text-align: center; }
    </style>
</head>
<body>
    
<div class="container">
    <header>
        <h1>Meta Lens</h1>
        <p class="subtitle">이미지 메타데이터 분석 도구</p>
    </header>

    <div class="privacy-note">
        <span>🔒</span> 보안 안내: 사진은 서버로 전송되지 않으며 브라우저 내에서 처리됩니다.
    </div>
    
    <div id="upload-section">
        <span class="upload-icon">📸</span>
        <div class="upload-text">사진을 선택하거나 이곳에 놓으세요</div>
        <div class="upload-subtext" style="font-size: 0.8rem; color: #94a3b8; margin-top:5px;">JPG, PNG, HEIC (최대 30MB)</div>
        <input type="file" id="file-input" accept="image/jpeg, image/png, image/heic, image/heif" style="display:none">
    </div>

    <div id="loading" class="loading-spinner">✨ 메타데이터 분석 중...</div>
    <div id="error-box" class="error-msg"></div>

    <div id="preview-container">
        <img id="preview">
        <!-- 버튼 위치 및 스타일 개선 -->
        <a id="map-btn" target="_blank">📍 Google 지도로 촬영지 보기</a>
    </div>

    <div class="table-wrapper">
        <table id="metadata-table">
            <tbody id="metadata-body"></tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>

<script>
    const section = document.getElementById('upload-section');
    const input = document.getElementById('file-input');
    const previewContainer = document.getElementById('preview-container');
    const preview = document.getElementById('preview');
    const mapBtn = document.getElementById('map-btn');
    const tbody = document.getElementById('metadata-body');
    const table = document.getElementById('metadata-table');
    const loading = document.getElementById('loading');
    const errorBox = document.getElementById('error-box');

    const MAX_FILE_SIZE = 30 * 1024 * 1024;

    section.onclick = () => input.click();
    input.onchange = (e) => handleFiles(e.target.files);

    section.ondragover = (e) => { e.preventDefault(); section.classList.add('dragover'); };
    section.ondragleave = () => section.classList.remove('dragover');
    section.ondrop = (e) => {
        e.preventDefault();
        section.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
    };

    async function handleFiles(files) {
        let file = files[0];
        if (!file) return;

        if (file.size > MAX_FILE_SIZE) {
            showError("파일이 너무 큽니다. 30MB 이하의 이미지를 선택해 주세요.");
            return;
        }

        resetUI();
        loading.style.display = 'block';

        try {
            if (file.type === "image/heic" || file.type === "image/heif" || file.name.toLowerCase().endsWith('.heic')) {
                const blob = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.8 });
                file = new File([blob], file.name.replace(/\.[^/.]+$/, ".jpg"), { type: "image/jpeg" });
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                previewContainer.style.display = 'block';
                section.classList.add('minimized');
                preview.onload = () => processMetadata(file);
            };
            reader.readAsDataURL(file);

        } catch (err) {
            showError("파일 처리 중 오류가 발생했습니다.");
            loading.style.display = 'none';
        }
    }

    function processMetadata(file) {
        EXIF.getData(file, function() {
            const tags = EXIF.getAllTags(this);
            loading.style.display = 'none';
            
            if (Object.keys(tags).length > 0) {
                table.style.display = 'table';
                
                const formatExifDate = (dateStr) => {
                    if(!dateStr) return null;
                    const parts = dateStr.split(' ');
                    if(parts.length < 2) return dateStr;
                    return parts[0].replace(/:/g, '-') + ' ' + parts[1];
                };

                const importantData = {
                    "기기 제조사": tags.Make,
                    "모델명": tags.Model,
                    "촬영 일시": formatExifDate(tags.DateTimeOriginal || tags.DateTime),
                    "해상도": `${tags.PixelXDimension || preview.naturalWidth} x ${tags.PixelYDimension || preview.naturalHeight}`,
                    "노출시간": tags.ExposureTime ? (tags.ExposureTime < 1 ? `1/${Math.round(1/tags.ExposureTime)}초` : `${tags.ExposureTime}초`) : null,
                    "조리개 값": tags.FNumber ? `f/${tags.FNumber}` : null,
                    "ISO 감도": tags.ISOSpeedRatings,
                    "초점 거리": tags.FocalLength ? `${tags.FocalLength}mm` : null
                };

                for (let key in importantData) {
                    if (importantData[key]) addRow(key, importantData[key], true);
                }

                const lat = EXIF.getTag(this, "GPSLatitude");
                const lon = EXIF.getTag(this, "GPSLongitude");
                
                if (lat && lon) {
                    const decLat = convertToDecimal(lat, EXIF.getTag(this, "GPSLatitudeRef"));
                    const decLon = convertToDecimal(lon, EXIF.getTag(this, "GPSLongitudeRef"));
                    
                    mapBtn.href = `https://www.google.com/maps?q=${decLat},${decLon}`;
                    mapBtn.style.display = 'inline-block'; // 중앙 정렬을 위해 inline-block 사용
                    
                    addRow("위도", decLat.toFixed(6));
                    addRow("경도", decLon.toFixed(6));
                } else {
                    addRow("위치 정보", "데이터 없음");
                }
            } else {
                showError("메타데이터를 찾을 수 없습니다.");
            }
        });
    }

    function addRow(label, value, isHighlight = false) {
        const row = document.createElement('tr');
        row.innerHTML = `<th>${label}</th><td class="${isHighlight ? 'highlight' : ''}">${value}</td>`;
        tbody.appendChild(row);
    }

    function convertToDecimal(pos, ref) {
        let val = pos[0].numerator / pos[0].denominator + 
                  (pos[1].numerator / pos[1].denominator) / 60 + 
                  (pos[2].numerator / pos[2].denominator) / 3600;
        return (ref === "S" || ref === "W") ? val * -1 : val;
    }

    function resetUI() {
        tbody.innerHTML = '';
        table.style.display = 'none';
        mapBtn.style.display = 'none';
        previewContainer.style.display = 'none';
        errorBox.style.display = 'none';
    }

    function showError(msg) {
        errorBox.innerText = msg;
        errorBox.style.display = 'block';
        loading.style.display = 'none';
    }
</script>
</body>
</html>
